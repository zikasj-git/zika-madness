/*
  UPSET BONUS — applies to ALL rounds (not just R64).
  Bonus = floor( (loser_seed - winner_seed) / 2 )
  i.e. the seed difference of the two teams playing, divided by 2.
  Examples:
    #12 beats #5  → floor((12-5)/2)  = floor(3.5) = 3 pts
    #7  beats #2  → floor((7-2)/2)   = floor(2.5) = 2 pts
    #11 beats #6  → floor((11-6)/2)  = floor(2.5) = 2 pts
    #15 beats #2  → floor((15-2)/2)  = floor(6.5) = 6 pts
    #16 beats #1  → floor((16-1)/2)  = floor(7.5) = 7 pts
  Only awarded when the higher seed (bigger number) wins.
*/
function upsetBonus(winnerSeed, loserSeed) {
  if (!winnerSeed || !loserSeed) return 0;
  if (winnerSeed <= loserSeed) return 0; // no upset, no bonus
  return Math.floor((winnerSeed - loserSeed) / 2);
}

/* ── ACTUAL RESULTS (blank — fill in as games are played) ── */
const ACTUAL = {
  South:   {r64:[],r32:[],s16:[],e8:[]},
  East:    {r64:[],r32:[],s16:[],e8:[]},
  West:    {r64:[],r32:[],s16:[],e8:[]},
  Midwest: {r64:[],r32:[],s16:[],e8:[]},
  finalFour: [],
  semis: [],
  champion: null,
};

/* Seed lookup — build from bracket */
const SEEDS={};
REGIONS.forEach(r=>BRACKET[r].forEach(t=>{SEEDS[t.name]=t.seed;}));

/*
  For upset bonus we need to know the OPPONENT's seed when scoring.
  We reconstruct matchups: in each round, game gi pits slots gi*2 vs gi*2+1
  from the previous round's winners (or the initial bracket for R64).
  Since we store only the winner name, we derive opponent seed from the bracket structure.
*/
function getMatchupSeeds(region, roundKey, gameIdx, actualResults) {
  const rounds = ["r64","r32","s16","e8"];
  const ri = rounds.indexOf(roundKey);
  if (ri === 0) {
    // R64: direct from bracket
    const t1 = BRACKET[region][gameIdx * 2];
    const t2 = BRACKET[region][gameIdx * 2 + 1];
    return [t1.seed, t2.seed];
  }
  // For later rounds, get the two teams that advanced from previous round
  const prevRound = rounds[ri - 1];
  const prevWinner1 = actualResults[region]?.[prevRound]?.[gameIdx * 2];
  const prevWinner2 = actualResults[region]?.[prevRound]?.[gameIdx * 2 + 1];
  return [SEEDS[prevWinner1] || null, SEEDS[prevWinner2] || null];
}

function calcScore(picks, actual) {
  let s = 0;
  REGIONS.forEach(r => {
    ["r64","r32","s16","e8"].forEach((rk, ri) => {
      (actual[r]?.[rk] || []).forEach((winner, gi) => {
        if (picks[r]?.[rk]?.[gi] === winner) {
          s += ROUND_PTS[ri];
          // Upset bonus: need opponent seed
          const [seed1, seed2] = getMatchupSeeds(r, rk, gi, actual);
          const winnerSeed = SEEDS[winner];
          const loserSeed  = (seed1 === winnerSeed) ? seed2 : seed1;
          s += upsetBonus(winnerSeed, loserSeed);
        }
      });
    });
  });
  (picks.finalFour||[]).forEach(p=>{if((actual.finalFour||[]).includes(p))s+=ROUND_PTS[4];});
  (picks.semis||[]).forEach(p=>{if((actual.semis||[]).includes(p))s+=ROUND_PTS[5];});
  if(picks.champion&&picks.champion===actual.champion)s+=ROUND_PTS[5];
  return s;
}

function emptyPicks(){

}

  const [email,setEmail]=useState(""); const [name,setName]=useState(""); const [mode,setMode]=useState("new"); const [saving,setSaving]=useState(false);
  const found=entries.find(e=>e.email===email.toLowerCase());
  async function submit(){ if(!email.trim())return; if(mode==="new"&&!name.trim())return; setSaving(true); await onRegister(email.trim(),mode==="returning"&&found?found.bracket_name:name.trim()); setSaving(false); }
  const tabSt=m=>({flex:1,padding:"10px 0",border:"none",background:mode===m?C.red:"transparent",color:mode===m?"#fff":C.muted,fontWeight:mode===m?700:400,fontSize:14});
  const inp={width:"100%",background:C.bg,border:`1px solid ${C.navyHi}`,borderRadius:6,padding:"11px 13px",color:C.text,fontSize:15,marginBottom:16};
  return(
    <div style={{maxWidth:460,margin:"0 auto",padding:"32px 0"}}>
      <PrideBanner/>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:28}}>
        <h2 style={{fontSize:26,fontWeight:900,margin:"0 0 6px",fontStyle:"italic"}}>Join the Pool</h2>
        <p style={{color:C.muted,fontSize:13,marginBottom:22}}>One bracket entry per email. No exceptions.</p>
        <div style={{display:"flex",border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:22}}>
          <button style={tabSt("new")} onClick={()=>setMode("new")}>New Entry</button>
          <button style={tabSt("returning")} onClick={()=>setMode("returning")}>Returning Player</button>
        </div>
        <label style={{display:"block",fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Email Address</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" style={inp} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {mode==="new"&&<>
          <label style={{display:"block",fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Bracket Name</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Uncle Dave's Dark Horses" maxLength={40} style={inp} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </>}
        {mode==="returning"&&found&&<div style={{background:C.greenDim,border:`1px solid ${C.green}`,borderRadius:6,padding:"9px 13px",fontSize:13,color:C.green,marginBottom:16}}>✓ Found: <strong>{found.bracket_name}</strong></div>}
        {mode==="returning"&&email.length>4&&!found&&<div style={{background:C.redFaint,border:`1px solid ${C.red}`,borderRadius:6,padding:"9px 13px",fontSize:13,color:C.redHi,marginBottom:16}}>No entry found — try "New Entry".</div>}
        <button onClick={submit} disabled={saving} style={{width:"100%",background:C.red,color:"#fff",border:"none",borderRadius:6,padding:"13px",fontSize:15,fontWeight:900,opacity:(email&&(mode==="returning"||name))&&!saving?1:0.45,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {saving&&<span className="spin">⟳</span>}{saving?"Saving…":mode==="new"?"Create My Bracket →":"Sign Back In →"}
        </button>
      </div>
    </div>
  );
}

/* ── TEAM BUTTON ── */
function TBtn({name,seed,isPicked,isCorrect,isWrong,bonus,onClick}){
  const bg=isCorrect?C.greenDim:isWrong?`${C.red}18`:isPicked?C.navy:C.bg;
  const brd=isCorrect?C.green:isWrong?C.red:isPicked?C.navyBright:C.border;
  const col=isCorrect?C.green:isWrong?C.redHi:isPicked?"#c8e0ff":C.muted;
  return(
    <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 9px",background:bg,border:`1px solid ${brd}`,borderRadius:4,color:col,fontSize:12,textAlign:"left",width:"100%",transition:"all 0.1s"}}>
      <span style={{background:C.navy,color:C.navyBright,border:`1px solid ${C.navyHi}`,borderRadius:3,padding:"1px 5px",fontSize:10,fontWeight:700,minWidth:20,textAlign:"center"}}>{seed}</span>
      <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>
      {bonus>0&&<span style={{background:C.red,color:"#fff",borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700,flexShrink:0}}>+{bonus}</span>}
      {isCorrect&&<span style={{fontWeight:700,flexShrink:0}}>✓</span>}
      {isWrong  &&<span style={{fontWeight:700,flexShrink:0}}>✗</span>}
    </button>
  );
}

/* ── BRACKET VIEW ── */
function BracketView({user,onSave}){
  const [picks,setPicks]=useState(()=>user.picks?JSON.parse(JSON.stringify(user.picks)):emptyPicks());
  const [tab,setTab]=useState("South"); const [saving,setSaving]=useState(false);

  function pick(region,rk,gi,name){
    const p=JSON.parse(JSON.stringify(picks)); p[region][rk][gi]=name;
    const rounds=["r64","r32","s16","e8"]; const ri=rounds.indexOf(rk);
    for(let r=ri+1;r<rounds.length;r++){ const n=8>>r; for(let g=0;g<n;g++){ const prev=rounds[r-1]; const f1=p[region][prev][g*2],f2=p[region][prev][g*2+1]; if(p[region][rounds[r]][g]!==f1&&p[region][rounds[r]][g]!==f2)p[region][rounds[r]][g]=null; } }
    const rIdx=REGIONS.indexOf(region); if(!p[region].e8[0]){p.finalFour[rIdx]=null;p.semis=[null,null];p.champion=null;}
    setPicks(p);
  }
  function pickSemi(slot,name){const p=JSON.parse(JSON.stringify(picks));p.semis[slot]=name;p.champion=null;setPicks(p);}
  function pickChamp(name){const p=JSON.parse(JSON.stringify(picks));p.champion=name;setPicks(p);}
  async function handleSave(){setSaving(true);await onSave(picks);setSaving(false);}

  const done=REGIONS.every(r=>picks[r].e8[0])&&picks.semis.every(Boolean)&&picks.champion;
  const tSt=v=>({padding:"8px 14px",background:tab===v?C.redFaint:C.card,border:`1px solid ${tab===v?C.red:C.border}`,borderRadius:4,color:tab===v?"#fff":C.muted,cursor:"pointer",fontSize:13,fontWeight:tab===v?700:400});

  return(
    <div className="fade-in">
      <PrideBanner/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:24,fontWeight:900,margin:0,fontStyle:"italic"}}>{user.bracket_name}'s Bracket</h2>
          <p style={{color:C.muted,fontSize:12,marginTop:3}}>Click a team to pick them. Selections cascade automatically.</p>
        </div>
        <button onClick={handleSave} disabled={saving} style={{background:done?C.red:C.navyHi,color:"#fff",border:"none",borderRadius:6,padding:"11px 22px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:7,opacity:saving?0.7:1}}>
          {saving&&<span className="spin">⟳</span>}{saving?"Saving…":done?"Save Bracket ✓":"Save Bracket (incomplete)"}
        </button>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:18,flexWrap:"wrap"}}>
        {REGIONS.map(r=><button key={r} style={tSt(r)} onClick={()=>setTab(r)}>{r}</button>)}
        <button style={tSt("Final")} onClick={()=>setTab("Final")}>🏆 Final Four</button>
      </div>
      {tab!=="Final"?<RegionBracket region={tab} picks={picks} onPick={pick}/>:<FinalFour picks={picks} onPickSemi={pickSemi} onPickChamp={pickChamp}/>}
    </div>
  );
}

/* ── REGION BRACKET ── */
function RegionBracket({region,picks,onPick}){
  const teams=BRACKET[region];
  const rounds=["r64","r32","s16","e8"];
  const labels=["Round of 64","Round of 32","Sweet 16","Elite Eight"];
  function getOpts(ri,gi){
    if(ri===0)return[teams[gi*2],teams[gi*2+1]];
    const prev=rounds[ri-1]; const a=picks[region][prev][gi*2],b=picks[region][prev][gi*2+1];
    return[a?{name:a,seed:SEEDS[a]}:null,b?{name:b,seed:SEEDS[b]}:null].filter(Boolean);
  }
  return(
    <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:16}}>
      {rounds.map((rk,ri)=>{
        const nG=8>>ri;
        return(
          <div key={rk} style={{flex:"0 0 188px"}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.dim,marginBottom:8,paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>
              {labels[ri]} <span style={{color:C.redHi}}>({ROUND_PTS[ri]}pt)</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {Array.from({length:nG}).map((_,gi)=>{
                const opts=getOpts(ri,gi); const picked=picks[region][rk][gi]; const actualW=ACTUAL[region]?.[rk]?.[gi];
                // calc bonus to display if correct
                let bonus=0;
                if(actualW&&picked===actualW){
                  const [s1,s2]=getMatchupSeeds(region,rk,gi,ACTUAL);
                  const ws=SEEDS[actualW]; const ls=(s1===ws)?s2:s1;
                  bonus=upsetBonus(ws,ls);
                }
                return(
                  <div key={gi} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:5,display:"flex",flexDirection:"column",gap:3}}>
                    {opts.length<2&&ri>0&&<div style={{color:C.dim,fontSize:10,textAlign:"center",padding:"7px 0"}}>← pick previous rounds</div>}
                    {opts.map((t,ti)=>{
                      if(!t)return null;
                      const nm=t.name||t,sd=t.seed||SEEDS[nm];
                      const isp=picked===nm,ok=isp&&actualW===nm,bad=isp&&actualW&&actualW!==nm;
                      return<TBtn key={ti} name={nm} seed={sd} isPicked={isp} isCorrect={ok} isWrong={bad} bonus={ok?bonus:0} onClick={()=>onPick(region,rk,gi,nm)}/>;
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── FINAL FOUR ── */
function FinalFour({picks,onPickSemi,onPickChamp}){
  const champs=REGIONS.map(r=>picks[r].e8[0]);
  function SemiPanel({slots,semiIdx}){
    return(
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:18,flex:1,minWidth:0}}>
        <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.dim,marginBottom:12,textAlign:"center",lineHeight:1.8}}>
          Semifinal {semiIdx+1}<br/><span style={{color:C.redHi}}>{REGIONS[slots[0]]} vs {REGIONS[slots[1]]}</span>
        </div>
        {slots.map(s=>{
          const t=champs[s];
          if(!t)return<div key={s} style={{color:C.dim,fontSize:12,textAlign:"center",padding:"10px 0",borderTop:`1px solid ${C.border}`,marginTop:7}}>{REGIONS[s]} champ TBD</div>;
          const isp=picks.semis[semiIdx]===t,ok=isp&&ACTUAL.semis?.[semiIdx]===t,bad=isp&&ACTUAL.semis?.[semiIdx]&&ACTUAL.semis[semiIdx]!==t;
          return<div key={s} style={{marginTop:7}}><TBtn name={t} seed={SEEDS[t]} isPicked={isp} isCorrect={ok} isWrong={bad} bonus={0} onClick={()=>onPickSemi(semiIdx,t)}/></div>;
        })}
      </div>
    );
  }
  return(
    <div>
      <h3 style={{fontSize:24,fontWeight:900,margin:"0 0 6px",fontStyle:"italic"}}>Final Four</h3>
      <p style={{color:C.muted,fontSize:12,marginBottom:24}}>Pick semifinal winners, then crown your champion.</p>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
        <SemiPanel slots={[0,2]} semiIdx={0}/>
        <div style={{background:`${C.red}0d`,border:`2px solid ${C.red}55`,borderRadius:10,padding:20,textAlign:"center",minWidth:158,flexShrink:0}}>
          <div style={{fontSize:36,marginBottom:6}}>🏆</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:C.redHi,marginBottom:12}}>Champion</div>
          {picks.semis[0]&&picks.semis[1]
            ?[picks.semis[0],picks.semis[1]].map(t=>{
              const isp=picks.champion===t,ok=isp&&ACTUAL.champion===t,bad=isp&&ACTUAL.champion&&ACTUAL.champion!==t;
              return<div key={t} style={{marginTop:7}}><button onClick={()=>onPickChamp(t)} style={{display:"block",width:"100%",padding:"10px 12px",background:ok?C.greenDim:bad?`${C.red}20`:isp?`${C.red}28`:C.bg,border:`2px solid ${ok?C.green:bad?C.red:isp?C.red:C.border}`,borderRadius:6,color:ok?C.green:bad?C.redHi:isp?"#fff":C.muted,fontSize:13,fontWeight:isp?700:400}}>{t} {ok&&"🏆"}{bad&&"✗"}</button></div>;
            })
            :<div style={{color:C.dim,fontSize:12,padding:"10px 0"}}>Pick both semis first</div>
          }
        </div>
        <SemiPanel slots={[1,3]} semiIdx={1}/>
      </div>
      {picks.champion&&<div style={{textAlign:"center",marginTop:22,fontSize:17,color:C.muted}}>Your Champion: <strong style={{color:"#fff"}}>{picks.champion}</strong>{ACTUAL.champion&&picks.champion===ACTUAL.champion&&<span style={{color:C.green}}> 🏆 Correct!</span>}{ACTUAL.champion&&picks.champion!==ACTUAL.champion&&<span style={{color:C.redHi}}> ✗</span>}</div>}
    </div>
  );
}

/* ── LEADERBOARD ── */
function Leaderboard({entries,me,onEdit,onRefresh}){
  const [refreshing,setRefreshing]=useState(false);
  const sorted=[...entries].sort((a,b)=>(b.score||0)-(a.score||0));
  async function handleRefresh(){setRefreshing(true);await onRefresh();setRefreshing(false);}
  return(
    <div className="fade-in">
      <PrideBanner/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:28,fontWeight:900,margin:0,fontStyle:"italic"}}>Leaderboard</h2>
          <p style={{color:C.muted,fontSize:12,marginTop:3}}>2026 Tournament · Scores update live as games complete</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={handleRefresh} disabled={refreshing} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"7px 14px",borderRadius:4,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
            {refreshing?<span className="spin">⟳</span>:"↻"} Refresh
          </button>
          {me&&<button onClick={onEdit} style={{background:"transparent",border:`1px solid ${C.red}`,color:C.redHi,padding:"7px 16px",borderRadius:4,fontSize:13,fontWeight:700}}>Edit My Bracket</button>}
        </div>
      </div>
      {sorted.length===0
        ?<div style={{textAlign:"center",color:C.dim,padding:"60px 20px",fontSize:15,background:C.card,borderRadius:10,border:`1px solid ${C.border}`}}>No entries yet — be the first!</div>
        :(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:24}}>
            <div style={{display:"flex",padding:"9px 14px",borderBottom:`1px solid ${C.border}`,fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.dim,gap:8}}>
              <span style={{width:38}}>#</span><span style={{flex:1}}>Bracket</span><span style={{width:56,textAlign:"right"}}>Pts</span><span style={{width:120,textAlign:"right"}}>Champion Pick</span>
            </div>
            {sorted.map((u,i)=>{
              const isMe=me?.id===u.id; const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
              const champ=u.picks?.champion||"—"; const champOk=u.picks?.champion&&u.picks.champion===ACTUAL.champion;
              return(
                <div key={u.id} style={{display:"flex",alignItems:"center",padding:"13px 14px",borderBottom:`1px solid ${C.border}`,gap:8,background:isMe?C.redFaint:i%2===0?C.card:C.surface,borderLeft:`3px solid ${isMe?C.red:"transparent"}`}}>
                  <span style={{width:38,fontSize:16}}>{medal}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>{u.bracket_name}{isMe&&<span style={{background:C.red,color:"#fff",borderRadius:3,padding:"2px 6px",fontSize:9,fontWeight:900}}>YOU</span>}</div>
                    <div style={{fontSize:11,color:C.dim,marginTop:1}}>{u.email}</div>
                  </div>
                  <span style={{width:56,textAlign:"right",fontWeight:700,fontSize:20,color:isMe?C.redHi:"#fff"}}>{u.score||0}</span>
                  <span style={{width:120,textAlign:"right",fontSize:12,color:champOk?C.green:C.dim}}>{champ}{champOk&&" 🏆"}</span>
                </div>
              );
            })}
          </div>
        )
      }
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:18}}>
        <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.dim,marginBottom:14}}>2026 Tournament Status</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {REGIONS.map(r=>(
            <div key={r} style={{flex:"1 1 130px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"10px 13px",fontSize:12,lineHeight:1.9}}>
              <strong style={{color:C.redHi}}>{r}</strong><br/>
              <span style={{color:C.muted}}>1-seed: {BRACKET[r][0].name}</span>
            </div>
          ))}
          <div style={{flex:"1 1 130px",background:C.bg,border:`1px solid ${C.red}66`,borderRadius:6,padding:"10px 13px",fontSize:12,lineHeight:1.9}}>
            <strong style={{color:C.redHi}}>🏆 Champion</strong><br/>
            <span style={{color:ACTUAL.champion?"#fff":C.dim,fontWeight:ACTUAL.champion?700:400}}>{ACTUAL.champion||"TBD"}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── SCORING GUIDE ── */
function ScoringGuide(){
  const exampleMatchups=[
    ["R64","#12 McNeese beats #5 Vanderbilt","12−5=7, ÷2","3 pts"],
    ["R64","#16 beats #1 Florida","16−1=15, ÷2","7 pts"],
    ["R32","#7 beats #2 Houston","7−2=5, ÷2","2 pts"],
    ["S16","#11 beats #3 Illinois","11−3=8, ÷2","4 pts"],
    ["E8", "#9 beats #1 Duke","9−1=8, ÷2","4 pts"],
  ];
  return(
    <div className="fade-in" style={{maxWidth:860,margin:"0 auto",padding:"34px 0"}}>
      <PrideBanner/>
      <h2 style={{fontSize:28,fontWeight:900,margin:"0 0 26px",fontStyle:"italic"}}>How Scoring Works</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16,marginBottom:20}}>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:22}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.redHi,marginBottom:14}}>🎯 Base Points Per Round</h3>
          {[["Round of 64","1pt"],["Round of 32","1pt"],["Sweet 16","2pts"],["Elite Eight","3pts"],["Final Four","5pts"],["Championship","8pts"]].map(([r,p])=>(
            <div key={r} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
              <span style={{color:C.muted}}>{r}</span><span style={{color:"#fff",fontWeight:700}}>{p}</span>
            </div>
          ))}
          <p style={{color:C.dim,fontSize:11,marginTop:10,lineHeight:1.6}}>Your champion pick is worth 8× your first-round picks. Late-round picks matter most.</p>
        </div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:22}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.redHi,marginBottom:14}}>🚀 Upset Bonus — All Rounds</h3>
          <p style={{color:C.muted,fontSize:12,lineHeight:1.65,marginBottom:10}}>Correctly pick a higher seed to win <strong style={{color:"#fff"}}>in any round</strong> and earn a bonus:</p>
          <div style={{background:C.bg,border:`1px solid ${C.navyHi}`,borderRadius:6,padding:"10px 12px",fontSize:13,color:"#7bc3ff",fontFamily:"monospace",marginBottom:14,lineHeight:1.8}}>
            Bonus = floor( (winner seed − loser seed) ÷ 2 )
          </div>
          <p style={{color:C.dim,fontSize:11,lineHeight:1.6}}>Bigger seed difference = bigger bonus. Applies whenever the higher-numbered seed wins.</p>
        </div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:22}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.redHi,marginBottom:14}}>📊 Upset Bonus Examples</h3>
          {exampleMatchups.map(([rnd,matchup,calc,pts])=>(
            <div key={matchup} style={{padding:"7px 0",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:C.muted,flex:1}}>{matchup}</span>
                <span style={{color:C.redHi,fontWeight:700,marginLeft:8}}>{pts}</span>
              </div>
              <div style={{color:C.dim,fontSize:10,marginTop:2}}>{rnd} · {calc}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.navyHi}`,borderRadius:10,padding:22}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#7bc3ff",marginBottom:10}}>📡 Live Score Updates via ESPN</h3>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.75}}>
          ZikaMadness polls ESPN's public scoreboard API every <strong style={{color:"#fff"}}>60 seconds</strong>. Scores update automatically as games complete. The ESPN status indicator in the top bar shows live connection and number of games in progress. <strong style={{color:"#fff"}}>First round: March 19–20. Final Four: April 4. Championship: April 6, Indianapolis.</strong>
        </p>
      </div>
    </div>
  );
}
